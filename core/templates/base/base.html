{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Gestión de gastos{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand text-white" href="#">Bienvenido</a>
        </div>
    </nav>

    <div class="menu-lateral">
      <nav>
        <a href="{% url 'home' %}">Inicio</a>
        <a href="{% url 'registro' %}">Registro</a>
        <a href="{% url 'login' %}">Iniciar sesión</a>
        <a href="{% url 'registrar_gastos' %}">Registrar Gastos</a>
        <a href="{% url 'listar_gastos' %}">Lista de Gastos</a>
      </nav>
    </div>

    <div class="contenido-principal">
        {% if messages %}
            <div id="msg-container">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show auto-dismiss" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="{% static 'js/mensajes.js' %}"></script>
  </body>
</html>
