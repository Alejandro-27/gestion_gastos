<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Gestión de gastos{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .menu-lateral {
        position: fixed;
        left: 0;
        top: 0;
        width: 200px;
        height: 100vh;
        background-color: #2c3e50;
        padding: 20px 0;
      }

      .menu-lateral h3 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
      }

      .menu-lateral a {
        display: block;
        color: white;
        padding: 15px 20px;
        text-decoration: none;
      }

      .menu-lateral a:hover {
        background-color: #34495e;
        color: white;
      }

      .contenido-principal {
        margin-left: 200px;
        padding: 20px;
      }

      .container-fluid {
        background-color: #2c3e50;
        padding: none;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand text-white" href="#">Bienvenido</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a
                class="nav-link active text-white active"
                aria-current="page"
                href="{% url 'home' %}"
                >Inicio</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="{% url 'registro' %}">Registro</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="{% url 'login' %}">Iniciar sesión</a>
            </li>
            <li class="nav-item">
              
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="menu-lateral">
      <nav>
        <a href="{% url 'home' %}">Inicio</a>
        <a href="{% url 'registro' %}">Registro</a>
        <a href="{% url 'login' %}">Iniciar sesión</a>
        <a href="{% url 'registrar_gastos' %}">Registrar Gastos</a>
        <a href="{% url 'listar_gastos' %}">Listar Gastos</a>
      </nav>
    </div>


    <div class="contenido-principal">
    {% if messages %}
        <div id="msg-container">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show auto-dismiss" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Esperar a que el DOM esté cargado
    document.addEventListener("DOMContentLoaded", function() {
        // Seleccionar todas las alertas que tengan la clase 'auto-dismiss'
        const alerts = document.querySelectorAll('.auto-dismiss');
        
        alerts.forEach(function(alert) {
            // Configurar un temporizador de 2000ms (2 segundos)
            setTimeout(function() {
                // Usar la API de Bootstrap para cerrar la alerta suavemente
                const bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            }, 2000); 
        });
    });
</script>

  </body>
  </body>
</html>
