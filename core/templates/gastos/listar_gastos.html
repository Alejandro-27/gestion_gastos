{% extends 'base/base.html' %}

{% block content %}
<h2>Lista de Gastos</h2>
<table class="table">
    <thead>
        <tr>
            <th>Descripción</th>
            <th>Monto</th>
            <th>Fecha</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for gasto in gastos %}
        <tr>
            <td>{{ gasto.descripcion }}</td>
            <td>${{ gasto.monto }}</td>
            <td>{{ gasto.fecha|date:"d/m/Y" }}</td>
            <td>
                <a href="{% url 'editar_gastos' gasto.id %}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{% url 'eliminar_gastos' gasto.id %}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
