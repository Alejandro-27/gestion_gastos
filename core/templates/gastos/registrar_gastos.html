{% extends 'base/base.html' %}
{% load static %}

{% block title %}Registrar gastos{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <h1 class="mb-4">Registrar gastos</h1>
            <p class="text-muted">Completa la información detallada abajo para registrar un nuevo movimiento.</p>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                      
                        
                        <div class="mb-3">
                            <label for="descripcion" class="form-label">Descripción:</label>
                            <input type="text" 
                                   id="descripcion" 
                                   name="descripcion" 
                                   class="form-control" 
                                   placeholder="Ej. Compra de suministros"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto:</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" 
                                       id="monto" 
                                       name="monto" 
                                       step="0.01" 
                                       class="form-control" 
                                       placeholder="0.00"
                                       required>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Registrar Gasto
                            </button>
                            <a href="{% url 'listar_gastos' %}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
